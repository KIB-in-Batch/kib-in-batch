name: Ollama Reply

on:
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  ollama-reply:
    if: contains(github.event.comment.body, '@ollama-comment')
    runs-on: ubuntu-latest
    steps:
      - name: Verify script integrity
        run: |
          # Download and verify Ollama installation script
          curl -fsSL https://ollama.com/install.sh -o install.sh
          # Consider adding checksum verification here
          chmod +x install.sh
          ./install.sh

      - name: Start Ollama service and pull model
        run: |
          ollama serve &
          sleep 4
          ollama pull llama3.2:3b

      - name: Generate reply with Ollama
        id: generate-reply
        env:
          USER_COMMENT: ${{ github.event.comment.body }}
        run: |
          # Safely escape and sanitize user input
          SANITIZED_COMMENT=$(printf '%s\n' "$USER_COMMENT" | sed 's/[&\/\]/\\&/g')
          
          PROMPT=$(cat <<'EOF'
          You are Ollama bot. A GitHub issue/PR comment mentioned you:
          
          EOF
          )
          PROMPT+=$(printf '%s\n' "$SANITIZED_COMMENT")
          PROMPT+=$(cat <<'EOF'
          
          Reply helpfully and concisely in markdown. If the comment asks for more context, ask for the minimum required info. Limit length to ~200-300 words.
          EOF
          )
          
          # Run Ollama and write the result to a file
          REPLY=$(ollama run llama3.2:3b "$PROMPT" 2>&1)
          echo "$REPLY" > reply.txt
          echo "Generated reply:"
          echo "$REPLY"

      - name: Authenticate GitHub App
        id: auth
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Post threaded reply
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.auth.outputs.token }}
          script: |
            const fs = require('fs');
            try {
              const reply = fs.readFileSync('reply.txt', 'utf8').trim();
              const targetCommentId = context.payload.comment.id;
              
              // Limit reply length to prevent abuse
              const maxLength = 5000;
              const truncatedReply = reply.length > maxLength ? reply.substring(0, maxLength) + '\n\n⚠️ *Reply was truncated*' : reply;
              
              const fullReply = `## 🤖 Ollama Bot Reply\n\n${truncatedReply}\n\n---\n*This reply was generated by Ollama running in GitHub Actions*`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullReply,
                in_reply_to: targetCommentId
              });
            } catch (error) {
              console.error('Error posting reply:', error);
              throw error;
            }

      - name: Cleanup
        if: always()
        run: |
          pkill -f ollama || true
          rm -f reply.txt install.sh
